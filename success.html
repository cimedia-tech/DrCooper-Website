<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent | Dr. Tony Cooper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center font-sans">
    <div class="max-w-md w-full bg-white p-8 rounded-2xl shadow-xl text-center border border-slate-100">
        <div class="mb-6 flex justify-center">
            <div class="bg-green-100 p-3 rounded-full">
                <svg class="w-12 h-12 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
        </div>
        <h1 class="text-3xl font-bold text-slate-800 mb-2">Thank You!</h1>
        <p class="text-slate-600 mb-8">Your message has been sent successfully. Dr. Cooper's team will get back to you shortly.</p>
        <a href="/" class="inline-block bg-blue-600 text-white px-8 py-3 rounded-lg font-semibold hover:bg-blue-700 transition-colors duration-200">
            Back to Home
        </a>
    </div>

</html>
